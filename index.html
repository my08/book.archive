<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Folio">
<meta name="theme-color" content="#F5F0E8">
<title>Folio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/grass.css">
<link rel="stylesheet" href="css/book.css">
<link rel="stylesheet" href="css/modal.css">
<link rel="stylesheet" href="css/calendar.css">
<link rel="stylesheet" href="css/finished.css">
</head>
<body>

<div class="screens">

  <!-- READING SCREEN -->
  <div id="screen-reading" class="screen active">
    <div class="header">
      <div class="header-logo">folio</div>
      <button class="icon-btn" onclick="openAddBook()">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
    <div class="grass-section">
      <div class="grass-label"><span>activity</span><span id="grass-year"></span></div>
      <div class="grass-wrap">
        <div class="grass-months" id="grass-months"></div>
        <div class="grass-grid" id="grass-grid"></div>
        <div class="grass-legend">
          <span>less</span>
          <div class="grass-legend-cell" style="background:var(--bg3)"></div>
          <div class="grass-legend-cell" style="background:#C8DFC9"></div>
          <div class="grass-legend-cell" style="background:#8EBE91"></div>
          <div class="grass-legend-cell" style="background:#5A9E5E"></div>
          <div class="grass-legend-cell" style="background:var(--accent)"></div>
          <span>more</span>
        </div>
      </div>
    </div>
    <div class="section-header">currently reading</div>
    <div id="book-list" class="book-list"></div>
  </div>

  <!-- CALENDAR SCREEN -->
  <div id="screen-calendar" class="screen">
    <div class="header"><div class="header-logo">folio</div></div>
    <div class="cal-header">
      <button class="cal-nav" id="cal-prev">‹</button>
      <div class="cal-month" id="cal-month-label"></div>
      <button class="cal-nav" id="cal-next">›</button>
    </div>
    <div class="cal-grid">
      <div class="cal-dow">
        <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
      </div>
      <div class="cal-days" id="cal-days"></div>
    </div>
  </div>

  <!-- FINISHED SCREEN -->
  <div id="screen-finished" class="screen">
    <div class="header"><div class="header-logo">folio</div></div>
    <div class="finished-controls">
      <button class="sort-btn active" id="sort-date" onclick="setSortAndRender('date')">date</button>
      <button class="sort-btn" id="sort-stars" onclick="setSortAndRender('stars')">rating</button>
    </div>
    <div id="finished-list" class="finished-list"></div>
  </div>

</div>

<nav class="nav">
  <button class="nav-btn active" onclick="showScreen('reading')" id="nav-reading">
    <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
    <div class="nav-dot"></div>
  </button>
  <button class="nav-btn" onclick="showScreen('calendar')" id="nav-calendar">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <div class="nav-dot"></div>
  </button>
  <button class="nav-btn" onclick="showScreen('finished')" id="nav-finished">
    <svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
    <div class="nav-dot"></div>
  </button>
</nav>

<!-- ADD BOOK -->
<div class="overlay" id="overlay-add">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">add book</div>
      <button class="close-btn" onclick="closeOverlay('overlay-add')">×</button>
    </div>
    <div class="modal-body">
      <div style="display:flex;gap:10px;align-items:flex-end" class="form-group">
        <div class="color-swatch" id="color-swatch-wrap" style="background:#4A7C4E">
          <input type="color" id="book-color-input" value="#4A7C4E" oninput="updateSwatch()">
        </div>
        <div style="flex:1">
          <label>title</label>
          <input type="text" id="new-book-title" placeholder="book title" autocomplete="off" oninput="onBookTitleInput()">
        </div>
        <div class="cover-box" id="cover-box" onclick="toggleCoverUrl()" style="cursor:pointer">
          <span class="cover-box-ph" id="cover-placeholder-el">?</span>
          <img id="cover-img" class="cover-box-img" style="display:none" alt="cover">
        </div>
      </div>
      <div class="form-group" id="cover-url-group" style="display:none">
        <label>cover url</label>
        <input type="url" id="cover-url-input" placeholder="paste image url" oninput="onCoverUrlInput()">
      </div>
      <div class="form-group">
        <label>track by</label>
        <div class="radio-group">
          <div class="radio-opt"><input type="radio" name="track-type" id="track-page" value="page" checked><label for="track-page">pages</label></div>
          <div class="radio-opt"><input type="radio" name="track-type" id="track-time" value="time"><label for="track-time">minutes</label></div>
        </div>
      </div>
      <button class="btn-primary" onclick="addBook()">add</button>
    </div>
  </div>
</div>

<!-- LOG SESSION -->
<div class="overlay bottom" id="overlay-log">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title" id="log-sheet-title"></div>
      <button class="close-btn" onclick="closeOverlay('overlay-log')">×</button>
    </div>
    <div class="sheet-body">
      <div class="form-group">
        <label>date</label>
        <input type="date" id="log-date">
      </div>
      <div class="form-group">
        <label id="log-type-label">pages (from → to)</label>
        <div class="input-row" id="log-page-row">
          <input type="number" id="log-from" placeholder="from" min="1" style="flex:1">
          <span class="input-sep">→</span>
          <input type="number" id="log-to" placeholder="to" min="1" style="flex:1">
        </div>
        <div id="log-time-row" style="display:none">
          <input type="number" id="log-minutes" placeholder="minutes" min="1">
        </div>
      </div>
      <div class="form-group">
        <label>memo</label>
        <textarea id="log-memo" placeholder="notes, quotes, thoughts..."></textarea>
      </div>
      <button class="btn-primary" onclick="saveLog()">save</button>
      <button class="btn-ghost" onclick="openFinishRating()">mark as finished</button>
    </div>
  </div>
</div>

<!-- RATING -->
<div class="overlay bottom" id="overlay-rating">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title">finished</div>
      <button class="close-btn" onclick="closeOverlay('overlay-rating')">×</button>
    </div>
    <div class="sheet-body" style="text-align:center;padding-top:20px">
      <div style="font-size:10px;color:var(--ink3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px">rating</div>
      <div class="star-row">
        <button class="star-btn dim" onclick="setStar(1)">★</button>
        <button class="star-btn dim" onclick="setStar(2)">★</button>
        <button class="star-btn dim" onclick="setStar(3)">★</button>
        <button class="star-btn dim" onclick="setStar(4)">★</button>
        <button class="star-btn dim" onclick="setStar(5)">★</button>
      </div>
      <button class="btn-primary" onclick="finishBook()" style="margin-top:14px">done</button>
    </div>
  </div>
</div>

<!-- CONFIRM DELETE -->
<div class="overlay" id="overlay-confirm">
  <div class="confirm-box">
    <div class="confirm-title">delete book?</div>
    <div class="confirm-sub" id="confirm-sub"></div>
    <div class="confirm-btns">
      <button class="confirm-cancel" onclick="closeOverlay('overlay-confirm')">cancel</button>
      <button class="confirm-ok" onclick="confirmDelete()">delete</button>
    </div>
  </div>
</div>

<!-- DAY POPUP -->
<div class="day-popup" id="day-popup">
  <button class="day-popup-close" onclick="closeDayPopup()">×</button>
  <div class="day-popup-date" id="day-popup-date"></div>
  <div id="day-popup-content"></div>
</div>

<div class="firework-overlay" id="firework-overlay"></div>

<script src="js/state.js"></script>
<script src="js/grass.js"></script>
<script src="js/books.js"></script>
<script src="js/log.js"></script>
<script src="js/calendar.js"></script>
<script src="js/finished.js"></script>
<script src="js/app.js"></script>
</body>
</html>
